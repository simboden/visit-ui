name: Publish npm package

on:
  push:
    branches:
      - master

concurrency:
  group: publish-visit-ui
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.detect.outputs.bump }}
      should_publish: ${{ steps.detect.outputs.should_publish }}
      is_dev_merge: ${{ steps.detect.outputs.is_dev_merge }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect associated dev PR merge
        id: pr_merge
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });

            const isDevMerge = response.data.some((pr) =>
              pr.merged_at && pr.base.ref === 'master' && pr.head.ref === 'dev'
            );

            core.setOutput('is_dev_merge', String(isDevMerge));

      - name: Detect release context
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags origin dev --depth=1 || true

          bump="$(node -e "const fs=require('fs'); const event=JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH,'utf8')); const messages=(event.commits ?? []).map((commit) => (commit.message || '').split('\\n')[0].trim().toLowerCase()); let bump='none'; for (const message of messages) { if (/^(feat|minor)(\\b|[:(])/.test(message)) { bump='minor'; break; } if (bump === 'none' && /^(patch|fix)(\\b|[:(])/.test(message)) { bump='patch'; } } process.stdout.write(bump);")"

          is_dev_merge='${{ steps.pr_merge.outputs.is_dev_merge }}'
          head_subject="$(git log -1 --pretty=%s)"

          if git show-ref --verify --quiet refs/remotes/origin/dev; then
            if git merge-base --is-ancestor HEAD origin/dev; then
              is_dev_merge=true
            fi

            if git rev-parse -q --verify HEAD^2 >/dev/null; then
              second_parent="$(git rev-parse HEAD^2)"
              if git merge-base --is-ancestor "$second_parent" origin/dev; then
                is_dev_merge=true
              fi
            fi
          fi

          if [[ "$head_subject" == Merge* ]] && [[ "$head_subject" == *dev* ]] && [[ "$head_subject" == *master* ]]; then
            is_dev_merge=true
          fi

          should_publish=false
          if [[ "$bump" != "none" ]]; then
            should_publish=true
          fi

          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "is_dev_merge=$is_dev_merge" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"

  publish:
    needs: analyze
    if: needs.analyze.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump visit-ui version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          new_version="$(npm --prefix packages/visit-ui version "${{ needs.analyze.outputs.bump }}" --no-git-tag-version | tail -n 1)"
          echo "new_version=${new_version#v}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/visit-ui/package.json packages/visit-ui/package-lock.json
          git commit -m "chore(release): visit-ui v${{ steps.version.outputs.new_version }}"
          git push origin HEAD:master

      - name: Build package
        run: pnpm --filter visit-ui build

      - name: Publish visit-ui
        run: pnpm --filter visit-ui publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}